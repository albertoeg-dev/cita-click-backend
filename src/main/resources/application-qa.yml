# ============================================================================
# CONFIGURACIÓN DE QA - CITA CLICK
# ============================================================================
# Activar con: SPRING_PROFILES_ACTIVE=qa
# Local:       ./mvnw spring-boot:run -Dspring-boot.run.profiles=qa
# Desplegado en DO App Platform (QA) apuntando a schema ccdiaq
# Variables de entorno requeridas: DB_PASSWORD, JWT_SECRET, STRIPE_SECRET_KEY,
#   STRIPE_API_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_BASE, STRIPE_PRICE_COMPLETO,
#   STRIPE_PRICE_MODULO_*, RESEND_API_KEY
# ============================================================================

spring:
  application:
    name: citaclick-api-qa

  # ============================================================================
  # BASE DE DATOS - Mismo servidor DO, schema de QA
  # Schema: ccdiaq (cita-click-qa)
  # ============================================================================
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db-espejel-studio-do-user-35883971-0.g.db.ondigitalocean.com:25060/db-cita-click?sslmode=require}
    username: ${DB_USER:MXCCSAAS}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: CitaClickQAPool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ============================================================================
  # JPA / HIBERNATE
  # ============================================================================
  jpa:
    hibernate:
      # update: primer deploy con schema vacío
      # validate: después de que las tablas ya existan
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:ccdiaq}
        format_sql: false
        jdbc:
          time_zone: America/Mexico_City
    open-in-view: false

# ============================================================================
# SERVER
# ============================================================================
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# ============================================================================
# LOGGING - Más verboso que prod para detectar errores en QA
# ============================================================================
logging:
  level:
    root: WARN
    com.reservas: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

# ============================================================================
# JWT
# ============================================================================
jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000
  refresh-expiration: 2592000000

# ============================================================================
# GOOGLE OAUTH2
# ============================================================================
google:
  client:
    id: ${GOOGLE_CLIENT_ID:400989323167-jefebaitebnnfv38aevs9ebrvnc4f5ng.apps.googleusercontent.com}

# ============================================================================
# STRIPE - Usar SIEMPRE claves TEST en QA (sk_test_... / pk_test_...)
# ----------------------------------------------------------------------------
# ⚠️  secret.key y api.key deben tener el MISMO valor (sk_test_...).
#
# PLANES: 2 productos en Stripe TEST.
# MÓDULOS: 9 productos en Stripe TEST, uno por módulo.
# ============================================================================
stripe:
  secret:
    key: ${STRIPE_SECRET_KEY}     # sk_test_... → Stripe Dashboard (TEST)
  api:
    key: ${STRIPE_API_KEY}        # ⚠️ MISMO valor que STRIPE_SECRET_KEY
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}  # whsec_... → Stripe Dashboard > Webhooks (TEST)
  success:
    url: http://localhost:5174/payment/success
  cancel:
    url: http://localhost:5174/payment/cancel
  # ── Planes base ─────────────────────────────────────────────────────────────
  price:
    base:     ${STRIPE_PRICE_BASE:price_1TMw03HXe9kH0IwKlpswfr0J}     # price_... Plan Base TEST ($299 MXN/mes)
    completo: ${STRIPE_PRICE_COMPLETO:price_1TMw2YHXe9kH0IwKJnBre9wO} # price_... Plan Completo TEST ($1,199 MXN/mes)
  # ── Módulos del marketplace (cada uno es un producto en Stripe) ─────────────
  # Crea primero los productos en Stripe Dashboard TEST → pega los price_... aquí
  modulos:
    email-recordatorios: ${STRIPE_PRICE_MODULO_EMAIL_RECORDATORIOS:price_1TMwu8HXe9kH0IwKmoJ4Dc14}  # $199/mes
    sms-whatsapp:        ${STRIPE_PRICE_MODULO_SMS_WHATSAPP:price_1TMwupHXe9kH0IwKRi0NyFTp}         # $349/mes
    cobros-online:       ${STRIPE_PRICE_MODULO_COBROS_ONLINE:price_1TMwvOHXe9kH0IwKuQKE3KsY}        # $349/mes
    reportes-avanzados:  ${STRIPE_PRICE_MODULO_REPORTES_AVANZADOS:price_1TMwvyHXe9kH0IwK6chx04az}   # $249/mes
    usuarios-extra:      ${STRIPE_PRICE_MODULO_USUARIOS_EXTRA:price_1TMwwkHXe9kH0IwKS4vc9tlH}       # $149/mes
    multi-sucursal:      ${STRIPE_PRICE_MODULO_MULTI_SUCURSAL:price_1TMwxHHXe9kH0IwK01SEzLtp}       # $399/mes
    branding-email:      ${STRIPE_PRICE_MODULO_BRANDING_EMAIL:price_1TMwzhHXe9kH0IwKG0neoi0f}       # $99/mes
    citas-extra:         ${STRIPE_PRICE_MODULO_CITAS_EXTRA:pprice_1TMwz8HXe9kH0IwKP7VFiovc}          # $99/mes (+100 citas)
    servicios-extra:     ${STRIPE_PRICE_MODULO_SERVICIOS_EXTRA:price_1TMwyYHXe9kH0IwKPzVkdHT6}      # $79/mes (+8 servicios)

# ============================================================================
# RESEND - Email
# ============================================================================
resend:
  api:
    key: ${RESEND_API_KEY}
  from:
    email: ${RESEND_FROM_EMAIL:info@citaclick.com.mx}
    name: ${RESEND_FROM_NAME:Cita Click Dev}
  templates:
    verificacion-correo:      ${RESEND_TEMPLATE_VERIFICACION:verificacin-correo-electrnico}
    recordatorio-clasico:     ${RESEND_TEMPLATE_RECORDATORIO_CLASICO:recordatorio-clasico}
    recordatorio-moderno:     ${RESEND_TEMPLATE_RECORDATORIO_MODERNO:recordatorio-moderno}
    recordatorio-minimalista: ${RESEND_TEMPLATE_RECORDATORIO_MINIMALISTA:recordatorio-minimalista}

# ============================================================================
# GCP
# ============================================================================
gcp:
  project:
    id: ${GCP_PROJECT_ID:}
  bucket:
    name: ${GCP_BUCKET_NAME:}

# ============================================================================
# TWILIO - Deshabilitado en QA
# ============================================================================
twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:}
  auth:
    token: ${TWILIO_AUTH_TOKEN:}
  phone:
    number: ${TWILIO_PHONE_NUMBER:}
  whatsapp:
    from: ${TWILIO_WHATSAPP_NUMBER:}
    number: ${TWILIO_WHATSAPP_NUMBER:}

# ============================================================================
# RATE LIMITING - Deshabilitado localmente, habilitado en DO QA
# ============================================================================
rate:
  limit:
    enabled: ${RATE_LIMIT_ENABLED:false}

# ============================================================================
# COOKIE & CORS
# Local HTTP:  COOKIE_SECURE=false, COOKIE_SAME_SITE=Strict (Vite proxy)
# DO QA HTTPS: COOKIE_SECURE=true,  COOKIE_SAME_SITE=None  (cross-origin)
# ============================================================================
app:
  cookie:
    secure: false             # HTTP en localhost
    same-site: Strict         # Funciona porque Vite proxea /api al backend
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
    extra-origins: ${FRONTEND_EXTRA_ORIGINS:http://localhost:5174}
  admin:
    secret-key: ${ADMIN_SECRET_KEY:dev-admin-secret-2024}

frontend:
  url: ${FRONTEND_URL:http://localhost:5174}

# ============================================================================
# SWAGGER / SPRINGDOC - Habilitado en QA para facilitar pruebas
# URL: https://<qa-backend-url>/api/swagger-ui.html
# ============================================================================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# ============================================================================
# ACTUATOR
# ============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
