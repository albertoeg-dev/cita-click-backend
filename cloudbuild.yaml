# ============================================
# CLOUD BUILD - BACKEND (Spring Boot)
# Usa Cloud Run Source Deploy — no requiere
# Artifact Registry propio ni pasos Docker manuales.
# ============================================
# Trigger PROD (master):  sin variables extra (defaults)
# Trigger QA   (test):
#   _SERVICE_NAME = citaclick-backend-qa
#   _FRONTEND_URL = https://citaclick-frontend-qa-742827122597.us-central1.run.app

substitutions:
  _SERVICE_NAME: citaclick-backend-prod
  _FRONTEND_URL: https://citaclick.com.mx

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--source'
      - '.'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'FRONTEND_URL=${_FRONTEND_URL},FRONTEND_EXTRA_ORIGINS=${_FRONTEND_URL}'
    timeout: '1500s'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
