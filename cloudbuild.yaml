# ============================================
# CLOUD BUILD - BACKEND (Spring Boot)
# ============================================
# Un solo archivo para prod y QA.
# Las diferencias se controlan con variables de sustitución en el trigger:
#
# Trigger PROD (master):
#   _SERVICE_NAME  = citaclick-backend-prod
#   _IMAGE_NAME    = citaclick-backend
#   _FRONTEND_URL  = https://citaclick.com.mx
#
# Trigger QA (test):
#   _SERVICE_NAME  = citaclick-backend-qa
#   _IMAGE_NAME    = citaclick-backend-qa
#   _FRONTEND_URL  = https://citaclick-frontend-qa-742827122597.us-central1.run.app

substitutions:
  _SERVICE_NAME: citaclick-backend-prod
  _IMAGE_NAME: citaclick-backend
  _FRONTEND_URL: https://citaclick.com.mx

steps:
  # 1. Construir imagen Docker (multi-stage: Maven build + JRE runtime)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/${_IMAGE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/${_IMAGE_NAME}:latest'
      - '.'
    timeout: '1200s'

  # 2. Subir imagen a Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/${_IMAGE_NAME}'

  # 3. Desplegar en Cloud Run con FRONTEND_URL correcto para CORS
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/${_IMAGE_NAME}:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--update-env-vars'
      - 'FRONTEND_URL=${_FRONTEND_URL},FRONTEND_EXTRA_ORIGINS=${_FRONTEND_URL}'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cita-click-images/${_IMAGE_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
